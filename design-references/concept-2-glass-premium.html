<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept 2 — 玻璃质感风 | Gentle Reminders</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    /* Layered gradient background — key to glass effect */
    background:
      radial-gradient(ellipse 80% 60% at 30% 20%, rgba(168,216,200,0.25), transparent),
      radial-gradient(ellipse 60% 70% at 80% 70%, rgba(126,184,218,0.2), transparent),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(200,180,210,0.15), transparent),
      #f0f2f5;
    padding:20px;
  }
  .app{max-width:480px;width:100%}

  /* Glass card */
  .glass-card{
    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(40px) saturate(140%);
    -webkit-backdrop-filter:blur(40px) saturate(140%);
    border-radius:32px;padding:44px 32px 36px;margin-bottom:18px;
    border:1px solid rgba(255,255,255,0.6);
    box-shadow:
      0 4px 24px rgba(0,0,0,0.04),
      0 16px 48px rgba(0,0,0,0.06),
      inset 0 1px 0 rgba(255,255,255,0.8);
    text-align:center;
  }
  .tree-emoji{
    font-size:80px;display:block;margin-bottom:16px;
    filter:drop-shadow(0 8px 24px rgba(94,139,126,0.2));
    animation: gentleFloat 5s ease-in-out infinite;
  }
  @keyframes gentleFloat{
    0%,100%{transform:translateY(0) rotate(0deg)}
    25%{transform:translateY(-8px) rotate(1deg)}
    75%{transform:translateY(-3px) rotate(-1deg)}
  }
  .glass-card h2{font-size:22px;font-weight:700;letter-spacing:-0.3px;color:#1e293b;margin-bottom:4px}
  .glass-card .subtitle{font-size:13px;color:#94a3b8;margin-bottom:20px}

  /* Stage pill */
  .stage-pill{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(94,139,126,0.1);color:#3d6b5e;
    padding:8px 20px;border-radius:24px;font-size:13px;font-weight:600;
    border:1px solid rgba(94,139,126,0.15);
    margin-bottom:16px;
  }
  .stage-pill .dot{width:7px;height:7px;border-radius:50%;background:#5eb3a3}

  /* Glass whisper */
  .glass-whisper{
    background:rgba(94,139,126,0.06);
    border-radius:20px;padding:20px 22px;margin:20px 0 0;
    border:1px solid rgba(94,139,126,0.1);
    text-align:left;font-size:14px;line-height:1.8;color:#475569;font-style:italic;
  }
  .glass-whisper .gw-icon{font-size:18px;margin-bottom:8px;display:block;opacity:0.5}

  /* Growth bar */
  .growth{margin-top:20px}
  .growth-labels{display:flex;justify-content:space-between;font-size:12px;color:#94a3b8;margin-bottom:6px}
  .growth-track{height:6px;border-radius:6px;background:rgba(0,0,0,0.06);overflow:hidden}
  .growth-fill{
    height:100%;border-radius:6px;
    background:linear-gradient(90deg,#5eb3a3,#7eb8da,#a8c8e0);
    transition:width 0.8s cubic-bezier(0.4,0,0.2,1);
    box-shadow:0 0 12px rgba(94,179,163,0.3);
  }

  /* Action cards — glass style */
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
  .act{
    background:rgba(255,255,255,0.45);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-radius:24px;padding:24px 18px;text-decoration:none;color:inherit;
    border:1px solid rgba(255,255,255,0.5);
    box-shadow:0 2px 12px rgba(0,0,0,0.03);
    transition:all 0.3s cubic-bezier(0.4,0,0.2,1);text-align:center;
  }
  .act:hover{
    transform:translateY(-5px);
    background:rgba(255,255,255,0.7);
    box-shadow:0 12px 40px rgba(0,0,0,0.1);
    border-color:rgba(255,255,255,0.8);
  }
  .act .a-icon{font-size:30px;display:block;margin-bottom:8px}
  .act .a-title{font-size:14px;font-weight:700;color:#1e293b}
  .act .a-desc{font-size:11px;color:#94a3b8;margin-top:3px}

  /* Vitality */
  .vitality{display:flex;justify-content:center;gap:6px;margin-top:14px}
  .v-dot{width:10px;height:10px;border-radius:50%}
  .v-dot.on{background:#5eb3a3;box-shadow:0 0 8px rgba(94,179,163,0.4)}
  .v-dot.off{background:#dde5e2}
</style>
</head>
<body>
<div class="app">
  <div class="glass-card">
    <span class="tree-emoji">🌿</span>
    <h2>心灵小树</h2>
    <p class="subtitle">每一次真诚的记录，都让它长大一点</p>

    <div class="stage-pill"><span class="dot"></span>幼苗阶段 · 第 3 天</div>

    <div class="glass-whisper">
      <span class="gw-icon">✦</span>
      午后的风很轻。不管你上午经历了什么，这里永远是你的树荫。
    </div>

    <div class="growth" style="margin-top:16px">
      <div class="growth-labels"><span>🌰 种子</span><span>🌳 大树</span></div>
      <div class="growth-track"><div class="growth-fill" style="width:62%"></div></div>
    </div>

    <div class="vitality">
      <div class="v-dot on"></div><div class="v-dot on"></div><div class="v-dot on"></div>
      <div class="v-dot on"></div><div class="v-dot off"></div>
    </div>
  </div>

  <div class="actions">
    <a href="#" class="act"><span class="a-icon">✧</span><span class="a-title">情绪打卡</span><span class="a-desc">记录今日心情</span></a>
    <a href="#" class="act"><span class="a-icon">✉</span><span class="a-title">我的信件</span><span class="a-desc">小树写给你的信</span></a>
    <a href="#" class="act"><span class="a-icon">↗</span><span class="a-title">趋势分析</span><span class="a-desc">情绪变化趋势</span></a>
    <a href="#" class="act"><span class="a-icon">◈</span><span class="a-title">心理评估</span><span class="a-desc">MSF-XGB 分析</span></a>
  </div>
</div>
</body>
</html>
