<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <script>
    (function(){try{var t=localStorage.getItem('gr-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();
    </script>
    <link rel="stylesheet" href="/static/css/style.css?v=5">
    {% block extra_head %}{% endblock %}
    {% block page_css %}{% endblock %}
</head>
<body{% block body_attrs %}{% endblock %}>
    <div class="bg-orbs">
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
    </div>
    {% block body %}{% endblock %}
    <script src="https://unpkg.com/lucide@0.562.0"></script>
    <script src="/static/js/app.js?v=5"></script>
    {% block page_js %}{% endblock %}
</body>
</html>
