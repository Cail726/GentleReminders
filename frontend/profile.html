{% extends "base_student.html" %}
{% block title %}个人中心 - Gentle Reminders{% endblock %}
{% block page_css %}
<style>
    .profile-container { max-width: 640px; margin: 0 auto; }

    .hero-card {
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        padding: 32px 28px; border-radius: var(--radius-lg);
        box-shadow: var(--shadow-card);
        border: 1px solid var(--glass-border);
        text-align: center; margin-bottom: 20px;
        animation: fadeInUp 0.5s var(--ease);
    }
    .hero-card .welcome-line {
        font-size: 16px; color: var(--text); margin-bottom: 20px;
    }
    .hero-card .welcome-line strong { font-size: 18px; }

    .tree-stats-row {
        text-align: center; margin-bottom: 12px;
    }
    .tree-stat-item {
        background: var(--bg-input); padding: 18px 12px; border-radius: var(--radius-sm);
        text-align: center;
    }
    .tree-stat-item .tsi-icon { font-size: 24px; margin-bottom: 4px; }
    .tree-stat-item .tsi-value { font-size: 24px; font-weight: 800; color: var(--primary); }
    .tree-stat-item .tsi-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .stage-hero { font-size: 48px; margin-bottom: 8px; }
    .stage-hero-name { font-size: 18px; font-weight: 800; color: var(--text); }
    .stage-hero-desc { font-size: 13px; color: var(--text-muted); margin-top: 4px; line-height: 1.6; }

    .checkin-item {
        display: flex; justify-content: space-between; align-items: center;
        padding: 14px 0; border-bottom: 1px solid var(--border-light);
    }
    .checkin-item:last-child { border-bottom: none; }
    .checkin-item .ci-left { display: flex; align-items: center; gap: 12px; }
    .checkin-item .ci-emoji {
        width: 36px; height: 36px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; flex-shrink: 0;
    }
    .checkin-item .ci-meta { font-size: 13px; }
    .checkin-item .ci-meta .ci-time { color: var(--text); font-weight: 600; }
    .checkin-item .ci-meta .ci-emotion { color: var(--text-secondary); margin-left: 8px; }
    .checkin-item .ci-content {
        font-size: 13px; color: var(--text-muted); max-width: 50%;
        text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
</style>
{% endblock %}
{% block content %}
<div class="page-container profile-container">
    <div class="hero-card">
        <p class="welcome-line">欢迎回来，<strong id="welcomeText">---</strong></p>
        <div class="stage-hero" id="stageEmoji">🌰</div>
        <div class="stage-hero-name" id="stageName">种子</div>
        <div class="stage-hero-desc" id="stageDesc">一颗种子在泥土中沉睡，等待第一缕阳光</div>
        <div class="progress-bar" style="margin-top:18px;">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="tree-stats-row" style="margin-top:8px;">
            <span style="font-size:13px;color:var(--text-muted);">成长进度</span>
        </div>
        <div class="tree-stats-row" style="margin-top:12px;">
            <div class="tree-stat-item" style="display:inline-block; margin:0 auto;">
                <div class="tsi-icon">💚</div>
                <div class="tsi-value" id="vitalityText">💚💚💚💚💚</div>
                <div class="tsi-label">活力</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>最近打卡记录</h3>
        <div id="checkinList">
            <p class="empty-state">还没有打卡记录，去写一篇吧～</p>
        </div>
    </div>

    <div class="btn-group">
        <a href="/checkin" class="btn btn-primary ripple">去打卡</a>
        <a href="/" class="btn btn-ghost ripple">返回首页</a>
    </div>
</div>
{% endblock %}
{% block page_js %}
<script>
    const EMO_COLORS = GR.EMO_COLORS;
    const EMO_ICONS = GR.EMO_ICONS;

    function renderVitality(health) {
        const full = Math.round((health || 100) / 20);
        let html = '';
        for (let i = 0; i < 5; i++) {
            html += i < full ? '💚' : '🤍';
        }
        return html;
    }

    async function initProfile() {
        try {
            const [uR, tR, lR] = await Promise.all([
                fetch('/api/user/info'),
                fetch('/api/tree/info'),
                fetch('/api/checkin/list')
            ]);
            const u = await uR.json(), t = await tR.json(), list = await lR.json();

            document.getElementById('welcomeText').textContent = u.nickname;
            document.getElementById('stageEmoji').textContent = t.stage_emoji || '🌰';
            document.getElementById('stageName').textContent = t.stage_name || '种子';
            document.getElementById('stageDesc').textContent = t.stage_desc || '';
            document.getElementById('progressFill').style.width = (t.exp || 0) + '%';
            document.getElementById('vitalityText').textContent = renderVitality(t.health);

            const wrap = document.getElementById('checkinList');
            if (!list.length) {
                wrap.innerHTML = '<p class="empty-state">还没有打卡记录，去写一篇吧～</p>';
            } else {
                let html = '';
                list.forEach(item => {
                    const bg = EMO_COLORS[item.emotion] || '#94a3b8';
                    var iconName = EMO_ICONS[item.emotion] || 'help-circle';
                    html += '<div class="checkin-item">' +
                        '<div class="ci-left">' +
                        '<span class="ci-emoji" style="background:' + bg + '33;color:' + bg + ';"><i data-lucide="' + iconName + '" style="width:18px;height:18px;"></i></span>' +
                        '<span class="ci-meta"><span class="ci-time">' + item.time + '</span><span class="ci-emotion">' + item.emotion + '</span></span>' +
                        '</div>' +
                        '<span class="ci-content">' + (item.content || '无') + '</span>' +
                        '</div>';
                });
                wrap.innerHTML = html;
                if (window.lucide) window.lucide.createIcons();
            }
        } catch (e) { console.error(e); }
    }

    initProfile();
</script>
{% endblock %}
