{% extends "base.html" %}
{% block title %}修改密码 - 管理后台{% endblock %}
{% block body_attrs %} class="no-nav"{% endblock %}
{% block body %}
<div class="auth-page">
    <div class="auth-card admin-auth">
        <div class="brand-area">
            <div class="brand-icon">🔒</div>
            <h1>修改默认密码</h1>
            <p class="subtitle">首次登录必须修改默认密码才能继续使用</p>
        </div>
        <div class="form-group">
            <label>当前密码</label>
            <input type="password" id="oldPassword" placeholder="请输入当前密码" autocomplete="current-password">
        </div>
        <div class="form-group">
            <label>新密码（至少6位）</label>
            <input type="password" id="newPassword" placeholder="请输入新密码" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label>确认新密码</label>
            <input type="password" id="confirmPassword" placeholder="请再次输入新密码" autocomplete="new-password" onkeydown="if(event.key==='Enter')handleChange()">
        </div>
        <button class="btn btn-primary ripple" onclick="handleChange()" style="width:100%;padding:14px;font-size:16px;margin-top:8px;background:#1E3A5F;">确认修改</button>
        <div class="switch-tip">
            <a href="/admin/logout">退出登录</a>
        </div>
    </div>
</div>
{% endblock %}
{% block page_js %}
<script>
    async function handleChange() {
        const oldPw = document.getElementById('oldPassword').value.trim();
        const newPw = document.getElementById('newPassword').value.trim();
        const confirm = document.getElementById('confirmPassword').value.trim();
        if (!oldPw || !newPw || !confirm) {
            GR.toast('请填写所有密码字段', 'error'); return;
        }
        if (newPw !== confirm) {
            GR.toast('两次输入的新密码不一致', 'error'); return;
        }
        if (newPw.length < 6) {
            GR.toast('新密码至少6位', 'error'); return;
        }
        try {
            const form = new FormData();
            form.append('old_password', oldPw);
            form.append('new_password', newPw);
            const res = await fetch('/api/admin/change-password', {
                method: 'POST',
                body: form
            });
            const data = await res.json();
            if (data.code === 200) {
                GR.toast(data.msg, 'success');
                setTimeout(() => { window.location.href = '/admin/index'; }, 1000);
            } else {
                GR.toast(data.msg || '修改失败', 'error');
            }
        } catch (e) {
            GR.toast('网络异常，请检查服务是否正常', 'error');
        }
    }
</script>
{% endblock %}
