{% extends "base.html" %}
{% block title %}登录 - Gentle Reminders{% endblock %}
{% block body_attrs %} class="no-nav"{% endblock %}
{% block body %}
<div class="auth-page">
    <div class="auth-card">
        <div class="brand-area">
            <div class="brand-icon"><i data-lucide="tree-pine" style="width:36px;height:36px;color:var(--primary);"></i></div>
            <h1>Gentle Reminders</h1>
            <p class="subtitle">大学生心理状态辅助评估系统</p>
        </div>
        <div class="form-group">
            <label>用户名 / 学号</label>
            <input type="text" id="username" placeholder="请输入用户名或学号" autocomplete="username">
        </div>
        <div class="form-group">
            <label>登录密码</label>
            <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleLogin()">
        </div>
        <button class="btn btn-primary ripple" onclick="handleLogin()" style="width:100%;padding:14px;font-size:16px;margin-top:8px;">登 录</button>
        <div class="switch-tip">
            还没有账号？<a href="/register">立即注册</a>
        </div>
    </div>
</div>
{% endblock %}
{% block page_js %}
<script>
    async function handleLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username || !password) { GR.toast('请填写完整的账号和密码', 'error'); return; }

        const formData = new FormData();
        formData.append('username', username);
        formData.append('password', password);
        try {
            const res = await fetch('/api/login', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.code === 200) { window.location.href = '/'; }
            else { GR.toast(data.msg || '登录失败', 'error'); }
        } catch (e) { GR.toast('网络异常，请检查服务是否正常', 'error'); }
    }
</script>
{% endblock %}
