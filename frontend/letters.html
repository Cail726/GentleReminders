{% extends "base_student.html" %}
{% block title %}我的信件 - Gentle Reminders{% endblock %}
{% block page_css %}
<style>
    .letters-container { max-width: 640px; margin: 0 auto; }

    .letter-card {
        background:
            linear-gradient(135deg, rgba(255,252,248,0.05) 0%, transparent 50%),
            var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        padding: 28px 32px; border-radius: var(--radius-lg);
        box-shadow: var(--shadow-card);
        border: 1px solid var(--glass-border);
        margin-bottom: 16px;
        cursor: pointer;
        transition: all 0.3s var(--ease);
        animation: fadeInUp 0.5s var(--ease);
        position: relative;
        overflow: hidden;
    }
    .letter-card::before {
        content: '';
        position: absolute; top: 0; left: 0; right: 0; height: 2px;
        background: var(--brand-gradient);
        opacity: 0; transition: opacity 0.3s var(--ease);
    }
    .letter-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-float); }
    .letter-card:hover::before { opacity: 1; }
    .letter-card .lc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .letter-card .lc-title {
        font-size: 17px; font-weight: 700; color: var(--text);
        font-family: var(--font-serif);
    }
    .letter-card .lc-milestone {
        font-size: 11px; color: var(--primary); background: var(--primary-soft);
        padding: 4px 12px; border-radius: 20px; font-weight: 600;
    }
    .letter-card .lc-summary { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
    .letter-card .lc-time { font-size: 12px; color: var(--text-muted); }

    .letter-detail {
        background:
            linear-gradient(180deg, rgba(255,252,248,0.08) 0%, transparent 30%),
            var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        padding: 40px 36px; border-radius: var(--radius-lg);
        box-shadow: var(--shadow-float);
        border: 1px solid var(--glass-border);
        margin-bottom: 20px;
        animation: fadeInUp 0.4s var(--ease);
    }
    .letter-detail .ld-title {
        font-size: 24px; font-weight: 800; color: var(--text);
        margin-bottom: 8px; text-align: center;
        font-family: var(--font-serif);
    }
    .letter-detail .ld-meta {
        text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 32px;
    }
    .letter-detail .ld-content {
        font-size: 16px; line-height: 2.2; color: var(--text-secondary);
        white-space: pre-line;
        font-family: var(--font-serif);
    }
    .letter-detail .ld-content p { margin-bottom: 16px; }
</style>
{% endblock %}
{% block content %}
<div class="page-container letters-container">
    <h2 style="margin-bottom:20px;"><i data-lucide="mail" style="width:24px;height:24px;display:inline-block;vertical-align:middle;margin-right:6px;"></i>我的信件</h2>
    <div id="lettersList">
        <p class="empty-state">还没有信件，等小树长大一些再来吧～</p>
    </div>
    <div id="letterDetail" style="display:none;"></div>
    <div class="btn-group" style="margin-top:16px;">
        <a href="/" class="btn btn-ghost ripple">返回首页</a>
    </div>
</div>
{% endblock %}
{% block page_js %}
<script>
    let currentLetters = [];

    async function loadLetters() {
        try {
            const res = await fetch('/api/letters');
            const data = await res.json();
            currentLetters = data;
            const wrap = document.getElementById('lettersList');
            if (!data.length) {
                wrap.innerHTML = '<p class="empty-state">还没有信件，等小树长大一些再来吧～</p>';
                return;
            }
            let html = '';
            data.forEach(l => {
                html += '<div class="letter-card" onclick="showLetter(' + l.id + ')">' +
                    '<div class="lc-header">' +
                    '<span class="lc-title">' + GR.escHtml(l.title) + '</span>' +
                    '<span class="lc-milestone"><i data-lucide="sprout" style="width:14px;height:14px;"></i> Lv.' + l.tree_level + '</span>' +
                    '</div>' +
                    '<div class="lc-summary">' + GR.escHtml(l.emotion_summary || '') + '</div>' +
                    '<div class="lc-time">' + l.time + '</div>' +
                    '</div>';
            });
            wrap.innerHTML = html;
            if (window.lucide) window.lucide.createIcons();
        } catch (e) { console.error(e); }
    }

    async function showLetter(id) {
        try {
            const res = await fetch('/api/letter/' + id);
            const l = await res.json();
            document.getElementById('lettersList').style.display = 'none';
            const detail = document.getElementById('letterDetail');
            detail.style.display = 'block';
            detail.innerHTML =
                '<div class="letter-detail">' +
                '<div class="ld-title">' + GR.escHtml(l.title) + '</div>' +
                '<div class="ld-meta"><i data-lucide="sprout" style="width:15px;height:15px;display:inline-block;vertical-align:middle;"></i> 小树 Lv.' + l.tree_level + ' · ' + l.time + '</div>' +
                '<div class="ld-content">' + GR.escHtml(l.content).replace(/\n/g, '<br>') + '</div>' +
                '<div class="btn-group" style="margin-top:24px;">' +
                '<button class="btn btn-ghost ripple" onclick="backToList()"><i data-lucide="arrow-left" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:4px;"></i>返回列表</button>' +
                '</div>' +
                '</div>';
            detail.scrollIntoView({ behavior: 'smooth' });
            if (window.lucide) window.lucide.createIcons();
        } catch (e) { console.error(e); }
    }

    function backToList() {
        document.getElementById('letterDetail').style.display = 'none';
        document.getElementById('lettersList').style.display = 'block';
    }

    loadLetters();
</script>
{% endblock %}
