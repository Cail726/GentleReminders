{% extends "base_admin.html" %}
{% block title %}全员情绪记录 - 管理后台{% endblock %}
{% block content %}
<div class="page-container wide">
    <h1 class="page-title">📋 全员情绪记录</h1>
    <p class="page-subtitle">匿名展示，低落/焦虑/疲惫情绪自动标红高亮</p>

    <div class="card">
        <div class="filter-bar">
            <label>情绪筛选</label>
            <select id="filterEmotion" onchange="applyFilter()">
                <option value="">全部情绪</option>
                <option value="开心">😊 开心</option>
                <option value="平静">😌 平静</option>
                <option value="放松">😎 放松</option>
                <option value="低落">😢 低落</option>
                <option value="焦虑">😰 焦虑</option>
                <option value="疲惫">😴 疲惫</option>
            </select>
            <label>搜索内容</label>
            <input type="text" id="filterContent" placeholder="输入关键词筛选..." oninput="applyFilter()">
            <span style="color:var(--text-muted);font-size:13px;margin-left:auto;" id="recordCount"></span>
        </div>

        <div class="data-table-wrap">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>匿名用户</th>
                        <th>情绪状态</th>
                        <th>心情随笔</th>
                        <th>打卡时间</th>
                    </tr>
                </thead>
                <tbody id="listBody">
                    <tr><td colspan="4" class="empty-state">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
{% block page_js %}
<script>
    const riskList = ['低落','焦虑','疲惫'];
    let allRecords = [];

    async function loadData() {
        try {
            const res = await fetch('/api/admin/all-checkin');
            allRecords = await res.json();
            applyFilter();
        } catch (e) {
            document.getElementById('listBody').innerHTML = '<tr><td colspan="4" class="empty-state">加载失败，请刷新重试</td></tr>';
        }
    }

    function applyFilter() {
        const ef = document.getElementById('filterEmotion').value;
        const cf = document.getElementById('filterContent').value.toLowerCase();
        let filtered = allRecords;
        if (ef) filtered = filtered.filter(r => r.emotion === ef);
        if (cf) filtered = filtered.filter(r => (r.content||'').toLowerCase().includes(cf));

        document.getElementById('recordCount').textContent = '共 ' + filtered.length + ' 条记录';

        if (!filtered.length) {
            document.getElementById('listBody').innerHTML = '<tr><td colspan="4" class="empty-state">暂无匹配记录</td></tr>';
            return;
        }

        let html = '';
        filtered.forEach(item => {
            const isRisk = riskList.includes(item.emotion);
            html += '<tr class="'+(isRisk?'risk-row':'')+'">' +
                '<td>' + item.user_anon + '</td>' +
                '<td>' + (isRisk ? '<span class="risk-tag">' + item.emotion + '</span> <span class="risk-badge">风险</span>' : item.emotion) + '</td>' +
                '<td>' + (item.content || '—') + '</td>' +
                '<td>' + item.time + '</td></tr>';
        });
        document.getElementById('listBody').innerHTML = html;
    }

    function handleLogout() { if (confirm('确定要退出管理后台吗？')) window.location.href = '/admin/logout'; }
    loadData();
</script>
{% endblock %}
